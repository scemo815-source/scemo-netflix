<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SCEMO NETFLIX - 현재 상영작</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <header class="header">
        <div class="container">
            <h1 class="logo">SCEMO NETFLIX</h1>
            <nav class="nav">
                <a href="#" class="nav-link active" data-category="trending">홈</a>
                <a href="#" class="nav-link" data-category="now_playing">현재 상영작</a>
                <a href="#" class="nav-link" data-category="popular">인기</a>
            </nav>
        </div>
    </header>

    <main class="main">
        <div class="container">
            <h2 id="section-title" class="section-title">트렌딩 영화</h2>
            <div id="loading" class="loading">영화를 불러오는 중...</div>
            <div id="movies-container" class="movies-grid"></div>
        </div>
    </main>

    <div id="movie-modal" class="modal">
        <div class="modal-overlay"></div>
        <div class="modal-content">
            <button class="modal-close">&times;</button>
            <div class="modal-body">
                <div class="modal-poster">
                    <img id="modal-poster-img" src="" alt="">
                </div>
                <div class="modal-info">
                    <h2 id="modal-title" class="modal-title"></h2>
                    <div class="modal-meta">
                        <div class="modal-rating">
                            <span class="rating-label">⭐ 평점</span>
                            <span id="modal-rating" class="rating-value"></span>
                        </div>
                        <div class="modal-viewers">
                            <span class="viewers-label">👥 누적 관객수</span>
                            <span id="modal-viewers" class="viewers-value"></span>
                        </div>
                        <div class="modal-date">
                            <span class="date-label">📅 개봉일</span>
                            <span id="modal-date" class="date-value"></span>
                        </div>
                    </div>
                    <div id="modal-trailer" class="modal-trailer" style="display: none;">
                        <h3>예고편</h3>
                        <div id="trailer-container" class="trailer-container"></div>
                    </div>
                    <div class="modal-overview">
                        <h3>줄거리</h3>
                        <p id="modal-overview"></p>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <script src="script.js"></script>
</body>
</html>
